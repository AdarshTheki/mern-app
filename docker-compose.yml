services:
  mongo:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - '27018:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: server
      MONGO_INITDB_ROOT_PASSWORD: Pass%40123
      MONGO_INITDB_DATABASE: cartify
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  mongo_data:
